<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>people you may wanna know</title>
    <link rel="stylesheet" href="style.css">
    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
    rel="stylesheet"/>
</head>
<body>
    <div id="hero-text">
    <h1>people you may wanna</h1>
    <h2><span class="connect">connect</span> for your project</h2>
    <h4>- made by <span class="mahin"><a href="#">armahin</a></span></h4>
    </div>
    <main>
        <div id="card">
            <div id="cover">
                <img class="cover" src="https://images.pexels.com/photos/1789968/pexels-photo-1789968.jpeg" alt="" srcset="">
                <img class='id same' src="https://images.pexels.com/photos/7275385/pexels-photo-7275385.jpeg" alt="">
                <button class="same" >Sketch</button>          
            </div>   
          
            <div id="identity-sec">
                <div id="name">
                    <h2>Alexa Raine</h2>
                    <h3>Creative Director</h3>
                </div>
                <div id="save-ico">
                    <i class="ri-bookmark-2-fill save-ico"></i>
                </div>

            </div>
            <div id="metrics">
                <div id = "rating" class="rating">
                    <i class="ri-star-fill"></i>
                    <div id="text">
                        <h4>5.0</h4>
                        <p>Rating</p>
                    </div>
                </div>
                <div id = "salary"  class="rating">
                    <i class="ri-flag-fill"></i>
                    <div id="text">
                        <h4>$150</h4>
                        <p>Hours</p>
                    </div>
                </div>
                <div id = "time"  class="rating">
                    <i class="ri-time-fill"></i>
                    <div id="text">
                        <h4>24</h4>
                        <p>Month</p>
                    </div>
                </div>
            </div>
            <div id="getintouch">
                <button>Get In Touch</button>
            </div>
        </div>
        
    </main>

    <script src="script.js"></script>
</body>
</html>
